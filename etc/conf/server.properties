tls.version=TLSv1.3,TLSv1.2
tls.cipher=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_DHE_RSA_WITH_AES_256_GCM_SHA384,TLS_DHE_DSS_WITH_AES_256_GCM_SHA384,TLS_DHE_RSA_WITH_AES_128_GCM_SHA256,TLS_DHE_DSS_WITH_AES_128_GCM_SHA256
connection.timeout=300
connection.max=500
flowcontrol.ratelimit.register=50
flowcontrol.parallelism.register=50
flowcontrol.ratelimit.query=100
flowcontrol.parallelism.query=100
flowcontrol.ratelimit.update=100
flowcontrol.parallelism.update=100
flowcontrol.ratelimit.get=100
flowcontrol.parallelism.get=100
flowcontrol.ratelimit.retrieve=100
flowcontrol.parallelism.retrieve=100
flowcontrol.ratelimit.deregister=50
flowcontrol.parallelism.deregister=50
agent.num.max=40