# Persistence mode: file / postgresql / sqlite / gauss
persistence.mode=postgresql

# PostgreSQL configuration (effective when persistence.mode=postgresql)
postgresql.host=127.0.0.1
postgresql.port=5432
postgresql.name=registry_center
postgresql.username=opena2a_t
postgresql.password=openA2A_T
postgresql.pool.min=5
postgresql.pool.max=20
postgresql.pool.timeout=30

# SQLite configuration (effective when persistence.mode=sqlite)
sqlite.path=${SQLITE_PATH:data/agents.db}

# GaussDB configuration (effective when persistence.mode=gauss)
gauss.host=${GAUSS_HOST:localhost}
gauss.port=${GAUSS_PORT:5432}
gauss.database=${GAUSS_DATABASE:a2a_registry}
gauss.username=${GAUSS_USER:a2a_user}
gauss.password=${GAUSS_PASSWORD}