# Listening IP, default 127.0.0.1, configurable
IP=127.0.0.1

# Server port, default 5000, configurable
PORT=5000

# Enable HTTPS
enable_https=true

# Identity certificate, only cer format supported
ssl_certfile=etc/ssl/server.cer

# Private key file, only pem format supported
ssl_keyfile=etc/ssl/server_key.pem

# Private key file password
ssl_keyfile_password=etc/ssl/cert_pwd

# Trust certificate, only cer format supported
ssl_ca_certs=etc/ssl/trust.cer

# Revocation list
#ssl_crl_file=etc/ssl/revocationlist.crl

# Registry signature configuration required
registry.sign.enabled=true

# Verify client certificate
verify_client=true

forwarded_allow_ips="127.0.0.1"

# Downloading JWK certificate path
JWK_CERT_PATH=etc/ssl/server.cer

# Private certificate file path
JWK_PRIVATE_KEY_PATH=etc/sign_cert

# JWK API rate limit (requests per second)
flowcontrol.ratelimit.jwk=10

# JWK API concurrency limit
flowcontrol.parallelism.jwk=1

# Enable vector database
use_vectordb=False

# Enable signature validation capability
signature_validation_enabled=true

# Enable agent approval capability
agent_approval_enabled=false

# Enable owner management logic
owner.isolation.enabled=true

# Owner validation mode
# strict: strict validation, CN must be valid format
# relaxed: relaxed mode, CN can be empty
owner.validation.mode=relaxed